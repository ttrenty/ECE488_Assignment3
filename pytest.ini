[pytest]
pythonpath = .
markers =
    slow: long-running tests kept out of the default Pixi test tasks
filterwarnings =
    ignore:.*V1 Primitives are deprecated.*:DeprecationWarning
    ignore:.*qiskit\\.providers\\.models is deprecated since Qiskit 1\\.2.*:DeprecationWarning
    ignore:.*The `QasmSimulator` backend will be deprecated.*:PendingDeprecationWarning
    ignore:.*The `StatevectorSimulator` backend will be deprecated.*:PendingDeprecationWarning
    ignore:.*The `UnitarySimulator` backend will be deprecated.*:PendingDeprecationWarning
    ignore:invalid escape sequence '\\[ls]':DeprecationWarning:squlearn\\.kernel\\.lowlevel_kernel\\.regularization
    ignore:gmpy2 version is too old to use \(2\.0\.0 or newer required\):UserWarning:sympy\.external\.gmpy
